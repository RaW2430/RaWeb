<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>颜色循环</title>
    <style>
        /* 设置全屏背景 */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: background-color 0.5s ease;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 48px;
        }

        /* 中心文本样式 */
        #currentColor {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- 显示当前颜色的文本 -->
    <div id="currentColor">红色</div>

    <script>
        // 定义颜色数组和初始索引
        const colors = ['red', 'yellow', 'blue'];
        let currentIndex = 0;

        // 获取body元素和显示颜色的元素
        const body = document.body;
        const colorText = document.getElementById('currentColor');

        // 添加点击事件监听器
        body.addEventListener('click', () => {
            // 切换到下一个颜色
            currentIndex = (currentIndex + 1) % colors.length;
            const currentColor = colors[currentIndex];

            // 设置背景颜色
            body.style.backgroundColor = currentColor;

            // 更新显示的颜色名称
            colorText.textContent = getColorName(currentColor);
        });

        /**
         * 根据颜色代码返回中文颜色名称
         * @param {string} color - 颜色代码（如 'red'）
         * @returns {string} 中文颜色名称
         */
        function getColorName(color) {
            const colorMap = {
                'red': '红色',
                'yellow': '黄色',
                'blue': '蓝色'
            };
            return colorMap[color] || color; // 如果颜色不在映射中，返回原颜色代码
        }
    </script>

</body>
</html>
